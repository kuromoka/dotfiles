# ~/.tmux.conf — tmux 設定ファイル
# 初心者向けに、よく使う設定をコメント付きでまとめています。
# 設定を変えたら prefix + r で再読み込みできます（下で設定）。

# -------------------------------------------------------------------
# prefix キー
# -------------------------------------------------------------------
# tmux の操作は「prefix キーを押してから別のキー」で行います。
# デフォルトは Ctrl+b ですが、押しやすい Ctrl+a に変更します。
unbind C-b
set -g prefix C-a
# Ctrl+a を 2 回押すと、アプリ側の Ctrl+a（行頭移動など）を送れます。
bind C-a send-prefix

# -------------------------------------------------------------------
# 基本の使い勝手
# -------------------------------------------------------------------
# マウス操作を有効化（ペイン選択・リサイズ・スクロールができる）
set -g mouse on

# ウィンドウ・ペインの番号を 1 始まりにする（キーボード左端に合わせる）
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じたら番号を詰め直す
set -g renumber-windows on

# スクロールバック（履歴）の行数を増やす
set -g history-limit 10000

# Esc キーの反応遅延をなくす（vim などで快適に）
set -sg escape-time 10

# 256 色 + 真のカラーを有効化（端末が対応している前提）
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# -------------------------------------------------------------------
# キーバインド
# -------------------------------------------------------------------
# prefix + r で設定ファイルを再読み込み
bind r source-file ~/.tmux.conf \; display-message "tmux.conf を再読み込みしました"

# ペイン分割を直感的に。| で縦分割、- で横分割
# （新しいペインは今いるディレクトリで開く）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ペイン移動を vim 風（prefix + h/j/k/l）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインのリサイズ（prefix + H/J/K/L、押しっぱなしで連続可）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# コピーモードを vi キーバインドに
setw -g mode-keys vi

# -------------------------------------------------------------------
# 見た目（ステータスバー）
# -------------------------------------------------------------------
# ステータスバーを上部に表示
set -g status-position top

# アクティブなウィンドウを目立たせる
set -g status-style "bg=colour237,fg=colour250"
setw -g window-status-current-style "bg=colour39,fg=colour231,bold"

# 左側にセッション名、右側に日時を表示
set -g status-left "#[bg=colour39,fg=colour231,bold] #S #[default] "
set -g status-left-length 20
set -g status-right "#[fg=colour250]%Y-%m-%d %H:%M "

# アクティブなペインの枠を強調
set -g pane-active-border-style "fg=colour39"
